<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <script async src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script async src="chat.js"></script>
        <link rel="stylesheet" href="main.css"/>
        <link rel="icon" href="data:,"/>
    </head>

    <body id="main">
        <div id="chat">
        </div>
        <div id="toolbar">
            <textarea id="prompt" rows=1 placeholder="Say anything..."></textarea>
            <span id="send" onclick="chat.send();" hidden>
                <svg fill="#000000" height="30px" width="30px" viewBox="0 0 32 32"><g> <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd" sketch:type="MSPage"> <g id="Icon-Set-Filled" sketch:type="MSLayerGroup" transform="translate(-570.000000, -257.000000)" fill="#000000"> <path d="M580.407,278.75 C581.743,281.205 586,289 586,289 C586,289 601.75,258.5 602,258 L602.02,257.91 L580.407,278.75 L580.407,278.75 Z M570,272 C570,272 577.298,276.381 579.345,277.597 L601,257 C598.536,258.194 570,272 570,272 L570,272 Z" id="send-email" sketch:type="MSShapeGroup"> </path> </g> </g> </g></svg>
            </span>
        </div>
    </body>

    <script>
        const prompt = document.getElementById('prompt');

        setInterval(() => {
            document.getElementById("send").hidden = prompt.value.trim() === '';
        }, 200);

        prompt.addEventListener('input', () => {
            prompt.style.height = 'auto'
            prompt.style.height = prompt.scrollHeight + 'px'
        })
    </script>

</html>
